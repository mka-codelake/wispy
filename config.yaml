# wispy configuration -- edit and restart wispy to apply changes.

# =======================================================================
# Model
# =======================================================================

# Name of the Whisper model. Used as the default subdirectory name
# under <wispy>/models/<model_name>/.
model_name: "large-v3-turbo"

# Hugging Face repo ID used for the one-time first-run download.
model_hub_id: "dropbox-dash/faster-whisper-large-v3-turbo"

# Storage path: where the model lives on disk.
#   null  = <wispy>/models/<model_name>/  (default)
#   value = absolute or relative path to use instead
# Useful when several wispy installs share one model on disk, or to
# keep the model on a different drive.
#   model_path: "D:\\shared\\whisper-models\\large-v3-turbo"
model_path: null

# =======================================================================
# CUDA runtime
# =======================================================================

# Storage path: where the CUDA runtime DLLs live once installed.
#   null  = <wispy>/cuda/  (default)
#   value = absolute or relative path to use instead
# Useful when several wispy installs share one CUDA bundle, or to keep
# CUDA off the wispy folder for backup convenience.
#   cuda_path: "D:\\shared\\wispy-cuda"
cuda_path: null

# =======================================================================
# Compute
# =======================================================================

# device:
#   "auto" (default) - use NVIDIA GPU when CUDA libs are present, else CPU
#   "cuda"           - force GPU; fails to start without the cuda/ bundle
#   "cpu"            - force CPU even on machines with a NVIDIA GPU
device: "auto"

# compute_type:
#   "default" - best precision for the chosen device (float16 on GPU, int8 on CPU)
#   "float16" / "int8_float16" / "int8" - explicit override
compute_type: "default"

# =======================================================================
# Language
# =======================================================================

# ISO 639-1 language code, e.g. "de", "en", "fr".
language: "de"

# =======================================================================
# Audio
# =======================================================================

sample_rate: 16000

# Audio input device:
#   null    = OS default microphone
#   integer = explicit device index
audio_device: null

# =======================================================================
# Hotkey
# =======================================================================

# Hotkey combo, e.g. "F9", "F12", "ctrl+space".
hotkey: "F9"

# Recording mode:
#   "hold"   = press-to-talk (default), release to stop
#   "toggle" = press once to start, press again to stop
record_mode: "hold"

# =======================================================================
# Transcription
# =======================================================================

beam_size: 5

# Optional priming text Whisper sees before each transcription.
# Empty string disables priming.
initial_prompt: ""

# =======================================================================
# Output
# =======================================================================

# After pasting transcribed text via Ctrl+V, restore whatever was on the
# clipboard before. true (default) = restore, false = leave wispy's
# transcribed text on the clipboard.
restore_clipboard: true

# =======================================================================
# Updates
# =======================================================================

# Three tiers of update behaviour:
#   update_check: false                       no check, no prompt, you handle updates manually
#   update_check: true,  auto_update: false   check + ask "[y/N]" before applying  (default)
#   update_check: true,  auto_update: true    check + apply silently + restart
update_check: true
auto_update: false

# =======================================================================
# Local sources (advanced / for testing)
# =======================================================================
# When set, wispy uses these local artefacts instead of downloading from
# Hugging Face / GitHub Releases. Aimed at offline testing and at avoiding
# repeated multi-GB downloads during development. null = normal network.

# Path to a directory that already contains a complete Whisper model
# (config.json, model.bin, preprocessor_config.json, tokenizer.json,
# vocabulary.json). Will be copied into the resolved model_path.
#   model_local_source: "D:\\test-cache\\large-v3-turbo"
model_local_source: null

# Path to a wispy-cuda-vX.Y.Z.zip file OR an already-extracted directory
# with cublas64_12.dll, cudnn_*.dll, cudart64_12.dll and a _version.txt
# marker. Will be installed into the resolved cuda_path.
#   cuda_local_source: "D:\\test-cache\\wispy-cuda-v12.9.1.zip"
#   cuda_local_source: "D:\\test-cache\\cuda"
cuda_local_source: null
