# wispy configuration -- edit and restart wispy to apply changes.

# --- Model --------------------------------------------------------------
# Name of the Whisper model. Used for the default model directory:
#   <wispy-folder>/models/<model_name>/
model_name: "large-v3-turbo"

# Optional absolute or relative path to a local model directory.
# null  = use the default <wispy-folder>/models/<model_name>
# Set this only if you keep models somewhere else on disk.
model_path: null

# Hugging Face repo ID used for the one-time first-run download.
model_hub_id: "dropbox-dash/faster-whisper-large-v3-turbo"

# --- Compute ------------------------------------------------------------
# device:
#   "auto" (default) - use NVIDIA GPU when CUDA libs are present, else CPU
#   "cuda"           - force GPU; fails to start without the cuda/ bundle
#   "cpu"            - force CPU even on machines with a NVIDIA GPU
device: "auto"

# compute_type:
#   "default" - best precision for the chosen device (float16 on GPU, int8 on CPU)
#   "float16" / "int8_float16" / "int8" - explicit override
compute_type: "default"

# --- Language -----------------------------------------------------------
language: "de"            # ISO code, e.g. "de", "en", "fr"

# --- Audio --------------------------------------------------------------
sample_rate: 16000
audio_device: null        # null = default microphone, or integer index

# --- Hotkey -------------------------------------------------------------
hotkey: "F9"              # e.g. "F9", "F12", "ctrl+space"
record_mode: "hold"       # "hold" (push-to-talk) or "toggle"

# --- Transcription ------------------------------------------------------
beam_size: 5
initial_prompt: ""

# --- Output -------------------------------------------------------------
restore_clipboard: true   # Restore previous clipboard after pasting

# --- Updates ------------------------------------------------------------
# Three tiers of update behaviour:
#   update_check: false                       no check, no prompt, you handle updates manually
#   update_check: true,  auto_update: false   check + ask "[y/N]" before applying  (default)
#   update_check: true,  auto_update: true    check + apply silently + restart
update_check: true
auto_update: false
