name: Claude Review

# Reviews PRs on open and synchronize. Tracks iterations via a single
# 'review:iteration-N' label. At N=3 the loop is broken and 'needs-human' is set.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'do-not-automate') &&
      !contains(github.event.pull_request.labels.*.name, 'needs-human')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Iteration cap guard
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if gh pr view "$PR" --json labels --jq '.labels[].name' | grep -qx 'review:iteration-3'; then
            echo "Iteration cap reached — escalating to human."
            gh pr edit "$PR" --remove-label 'review:iteration-3' --add-label 'needs-human' || true
            gh pr comment "$PR" --body 'Review iteration cap (3) reached. Escalating to human reviewer.'
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude reviewer
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_BOT_PAT }}
          show_full_output: true
          allowed_bots: "claude[bot]"
          claude_args: |
            --model opus
            --max-turns 50
            --allowed-tools "Read,Glob,Grep,LS,Bash"
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} for this repository.

            ## Step 1 — Carry-forward of prior review rounds

            Before drafting your verdict, fetch all prior review comments by yourself on this PR:

            ```
            gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.author.login=="claude")'
            ```

            For each prior `## Review — Changes requested` block from yourself, check whether the listed findings still apply to the current code state:
            - If the finding was addressed by a commit since: do NOT carry it forward, but mention briefly in your new verdict ("Previously raised: X — resolved in commit Y").
            - If the finding still applies: include it in your new verdict. Do NOT silently drop prior findings — that is the failure mode this step exists to prevent.

            ## Step 2 — Verify

            Read the PR description (analysis, plan, result sections), the diff, and the linked issue. Verify:

            1. The implementation matches the plan in the PR body.
            2. The change actually solves the issue's acceptance criteria.
            3. No regressions, dead code, leftover debug output.
            4. Tests exist where reasonable; Windows-only behavior is flagged as untested.
            5. Style matches the repo (no speculative abstractions, minimal comments, no new deps without justification).
            6. **Scope discipline — flag any of these as concrete findings, not generic "looks good":**
               - Any change to `.gitignore` that the issue did not explicitly request.
               - Any change to root-level config or convention files (`pyproject.toml`, `setup.cfg`, `.editorconfig`, etc.) not justified by the issue.
               - Any file in the diff that is not directly necessary for the issue's acceptance criteria.
            7. **Briefing compliance — flag these as bot-fixable findings, not human-only:**
               - **PR title marker:** if the change touches Windows-only APIs (audio devices, hotkeys, clipboard, winsound, UAC elevation, PowerShell helpers, registry, Windows-specific paths), the title MUST contain the literal marker `[needs-windows-test]` per AGENT_BRIEFING.md Phase 2 test-strategy rule. Missing marker → bot-fixable.
               - **PR body sections:** the PR description MUST contain `## Analysis`, `## Plan`, and `## Result` sections per AGENT_BRIEFING.md Phase 2/3. If the body contains only the auto-generated dispatcher boilerplate (e.g. starts with "Auto-created by claude-dispatcher"), the bot must rewrite it via `gh pr edit --body` after the auto-draft-PR step. Missing sections → bot-fixable.

            ## Step 3 — Classify each finding

            Each finding belongs to exactly one of two categories:

            - **Bot-fixable**: items the bot can address by changing tracked files within its allowed scope.
            - **Human-only**: items that require modifying files the bot is hard-constrained from touching (`.github/workflows/claude-*.yml`, `release.yml`), OR items requiring judgement only a human can make (e.g. semver bump decisions, release notes wording, deciding whether a feature should ship at all). Note: `CLAUDE.md` is now committed and IS bot-fixable.

            ## Step 4 — Act

            **If no findings (or only "previously resolved" notes):**
            Post a sticky review comment starting with `## Review — APPROVED` summarizing the verification. Add label `review:approved`. Do not add any iteration label. Do not request changes. Then mark the PR as ready for review (no longer draft) using `gh pr ready ${{ github.event.pull_request.number }}` — this signals that the bot considers its work complete and human approval and merge can happen.

            **If only human-only findings (no bot-fixable):**
            Post `## Review — APPROVED with notes for human reviewer` followed by a `### For human reviewer (bot cannot fix)` section listing each item. Add label `review:approved`. Do NOT post `@claude fix`. Do NOT add iteration label. Mark the PR as ready (`gh pr ready`).

            **If bot-fixable findings (with or without human-only ones):**
            Post `## Review — Changes requested` with two clearly separated sections when applicable:
            - `### Bot-fixable findings` (concrete, file:line where possible)
            - `### For human reviewer (bot cannot fix)` (only if any exist)

            End the comment with the literal line `@claude fix the items above` — but ONLY referring to the bot-fixable section. Update the iteration label: remove the current `review:iteration-N` label if present, and add the next one (`review:iteration-1` if none was set, otherwise increment by 1; cap at 3). PR stays Draft.

            Use the GitHub CLI (`gh`) for all label and comment operations. Do not approve the PR via the GitHub review UI — use comments only. The human reviewer is the final gate.
