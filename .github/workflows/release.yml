# Release workflow — triggered by version tags (vX.Y.Z).
# Builds the portable Windows bundle via PyInstaller and publishes a GitHub Release.
#
# Version sanity check (first step): verifies that the pushed tag matches the version
# declared in pyproject.toml. This prevents partial releases caused by tagging without
# bumping the version file — a mismatch fails fast before the build runs, so no
# half-built artifacts ever reach the release page. Tags containing a hyphen
# (e.g. v1.0.0-rc1) are automatically marked as pre-release by the publish step.
name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version sanity check
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $tagVersion = $tag -replace '^v', ''
          $tomlContent = Get-Content pyproject.toml -Raw
          if ($tomlContent -match 'version\s*=\s*"([^"]+)"') {
              $tomlVersion = $Matches[1]
          } else {
              Write-Error "Could not read version from pyproject.toml"
              exit 1
          }
          if ($tagVersion -ne $tomlVersion) {
              Write-Error "Tag '$tag' does not match pyproject.toml version '$tomlVersion'. Bump pyproject.toml and re-tag."
              exit 1
          }
          Write-Host "Version OK: $tomlVersion"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build portable bundle + ZIP
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build/build.ps1 -CreateZip

      - name: Extract release notes from CHANGELOG.md
        shell: pwsh
        run: |
          python build/extract_release_notes.py --tag "${{ github.ref_name }}" --output release-notes.md
          Write-Host "--- Release notes for ${{ github.ref_name }} ---"
          Get-Content release-notes.md
          Write-Host "------------------------------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          # tags containing a hyphen (e.g. v1.0.0-rc1) are treated as pre-release; stable tags have none
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/wispy-${{ github.ref_name }}.zip
