name: Claude Dispatcher

# Reacts to @claude mentions in issue or PR comments, and to issue assignments.
# Skips when guard labels are present.

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned]

concurrency:
  group: claude-dispatcher-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: |
      !contains(github.event.issue.labels.*.name, 'do-not-automate') &&
      !contains(github.event.issue.labels.*.name, 'needs-human') &&
      !contains(github.event.issue.labels.*.name, 'blocked-by-ambiguity') &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        github.event_name == 'issues'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-7[1m]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load agent briefing from main
        # Always load briefing from main, not from the PR branch.
        # Otherwise the bot would see the briefing state of its own branch
        # (frozen at branch-creation time), and any briefing tightening
        # would only take effect after manual rebase.
        run: |
          git fetch --depth=1 origin main:refs/remotes/origin/main
          {
            echo 'AGENT_BRIEFING<<EOF_AGENT_BRIEFING'
            git show origin/main:.github/AGENT_BRIEFING.md
            echo 'EOF_AGENT_BRIEFING'
          } >> "$GITHUB_ENV"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_BOT_PAT }}
          show_full_output: true
          allowed_bots: "claude[bot]"
          claude_args: |
            --model opusplan
            --max-turns 100
            --append-system-prompt
            ${{ env.AGENT_BRIEFING }}

      - name: Auto-create draft PR if branch was created
        if: success()
        env:
          # Use the PAT, not GITHUB_TOKEN: PRs created with the default token
          # do not trigger pull_request workflows (GitHub self-loop protection),
          # which would prevent the reviewer from running on the initial PR.
          GH_TOKEN: ${{ secrets.WORKFLOW_BOT_PAT }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git fetch origin --prune
          BRANCH=$(git branch -r --list "origin/claude/issue-${ISSUE}-*" --sort=-committerdate | head -1 | sed 's|^[[:space:]]*origin/||')
          if [ -z "$BRANCH" ]; then
            echo "No claude/issue-${ISSUE}-* branch found — nothing to do."
            exit 0
          fi
          if gh pr list --head "$BRANCH" --state all --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for $BRANCH — skipping."
            exit 0
          fi
          TITLE=$(git log -1 --pretty=%s "origin/$BRANCH")
          gh pr create --draft --base main --head "$BRANCH" \
            --title "$TITLE" \
            --body "Closes #${ISSUE}

          Auto-created by claude-dispatcher. Plan, file list, and test notes are in the latest comment on issue #${ISSUE} and in commit messages on this branch.

          PR is opened as **Draft**. The reviewer workflow will mark it **Ready for review** once it issues an APPROVED verdict."
