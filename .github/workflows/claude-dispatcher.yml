name: Claude Dispatcher

# Reacts to @claude mentions in issue or PR comments, and to issue assignments.
# Skips when guard labels are present.

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned]

concurrency:
  group: claude-dispatcher-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: |
      !contains(github.event.issue.labels.*.name, 'do-not-automate') &&
      !contains(github.event.issue.labels.*.name, 'needs-human') &&
      !contains(github.event.issue.labels.*.name, 'blocked-by-ambiguity') &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        github.event_name == 'issues'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-7[1m]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load agent briefing into env
        run: |
          {
            echo 'AGENT_BRIEFING<<EOF_AGENT_BRIEFING'
            cat .github/AGENT_BRIEFING.md
            echo 'EOF_AGENT_BRIEFING'
          } >> "$GITHUB_ENV"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opusplan
            --max-turns 25
            --append-system-prompt
            ${{ env.AGENT_BRIEFING }}
