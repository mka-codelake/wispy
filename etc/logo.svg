<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <!-- Microphone body -->
  <rect x="36" y="28" width="28" height="48" rx="14" ry="14" fill="#2563eb"/>
  <!-- Microphone arc -->
  <path d="M18,72 Q18,104 50,104 Q82,104 82,72" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="50" y1="104" x2="50" y2="124" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <line x1="34" y1="124" x2="66" y2="124" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <!-- Sound wave lines (right of mic) -->
  <path d="M92,56 Q100,80 92,104" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <path d="M104,44 Q116,80 104,116" fill="none" stroke="#93c5fd" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Project name -->
  <text x="132" y="100" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#1e293b" letter-spacing="-2">wispy</text>
</svg>
